<!DOCTYPE html>
<html lang="es" data-theme="emerald">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Reservas Médicas</title>
  <link href="/output.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    #mensaje {
      position: fixed;
      top: 5.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      min-width: 320px;
      max-width: 90vw;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      animation: slideDown 0.3s ease;
    }
    #mensaje.hidden { display: none !important; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body class="bg-base-200 min-h-screen">
  <div id="mensaje" class="alert hidden gap-3" role="alert"></div>
  <!-- Navbar -->
  <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
        Reservas Médicas
      </a>
    </div>
    <div class="flex-none gap-2">
      <button class="btn btn-ghost btn-circle">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
      </button>
      <div class="avatar placeholder">
        <div class="bg-primary text-primary-content rounded-full w-10">
          <span class="text-lg font-semibold">L</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="container mx-auto p-6 max-w-6xl">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Left Column: New Reservation Form -->
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h2 class="card-title text-xl gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Nueva reserva
          </h2>
          <form id="formReserva" class="space-y-4" novalidate>
            <div class="form-control">
              <label class="label" for="pacienteNombre">
                <span class="label-text font-medium">Nombre del paciente</span>
              </label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-base-content/50">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                  </svg>
                </div>
                <input type="text" id="pacienteNombre" placeholder="Nombre completo" class="input input-bordered w-full pl-10" required>
              </div>
            </div>
            <div class="form-control">
              <label class="label" for="medicoId">
                <span class="label-text font-medium">Médico</span>
              </label>
              <select id="medicoId" class="select select-bordered w-full" required>
                  <option value="" disabled selected>Seleccione un médico</option>
                  <option value="M001">Dr. Carlos García — Medicina general</option>
                  <option value="M002">Dra. María López — Pediatría</option>
                  <option value="M003">Dr. Andrés Martínez — Traumatología</option>
                  <option value="M004">Dra. Laura Rodríguez — Dermatología</option>
                  <option value="M005">Dr. Pedro Sánchez — Cardiología</option>
                </select>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="form-control">
                <label class="label" for="fecha">
                  <span class="label-text font-medium">Fecha de la cita</span>
                </label>
                <input type="text" id="fecha" class="input input-bordered w-full" placeholder="Seleccione la fecha" readonly required>
              </div>
              <div class="form-control">
                <label class="label" for="hora">
                  <span class="label-text font-medium">Hora preferida</span>
                </label>
                <input type="time" id="hora" class="input input-bordered w-full" required>
              </div>
            </div>
            <div class="form-control">
              <label class="label" for="motivo">
                <span class="label-text font-medium">Motivo de la consulta</span>
              </label>
              <textarea id="motivo" placeholder="Describa brevemente los síntomas o el motivo de la visita..." class="textarea textarea-bordered h-24"></textarea>
            </div>
            <div class="form-control mt-6">
              <button type="submit" class="btn btn-primary w-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Crear reserva
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Right Column: Existing Reservations -->
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <div class="flex justify-between items-center mb-4">
            <h2 class="card-title text-xl">Reservas existentes</h2>
            <button type="button" class="btn btn-sm btn-ghost gap-1" onclick="cargarReservas()">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
              ACTUALIZAR
            </button>
          </div>
          <ul id="listaReservas" class="space-y-3 min-h-[200px]">
            <li class="flex flex-col items-center justify-center py-12 text-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-base-content/30 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <p class="font-semibold text-base-content/70">No hay reservas</p>
              <p class="text-sm text-base-content/50 mt-1">Las citas médicas aparecerán aquí automáticamente.</p>
            </li>
          </ul>
          <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-base-200">
            <div class="stat bg-base-200 rounded-lg py-4 px-4">
              <p class="stat-desc text-xs font-medium opacity-70">TOTAL HOY</p>
              <p id="totalHoy" class="stat-value text-2xl">0</p>
            </div>
            <div class="stat bg-base-200 rounded-lg py-4 px-4">
              <p class="stat-desc text-xs font-medium opacity-70">PENDIENTES</p>
              <p id="pendientes" class="stat-value text-2xl">0</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
  <script>
    const API_BASE = '/api/reservas';
    const MEDICOS = {
      'M001': 'Dr. Carlos García',
      'M002': 'Dra. María López',
      'M003': 'Dr. Andrés Martínez',
      'M004': 'Dra. Laura Rodríguez',
      'M005': 'Dr. Pedro Sánchez'
    };

    function mostrarMensaje(texto, tipo = 'success') {
      const el = document.getElementById('mensaje');
      const icono = tipo === 'error'
        ? '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>'
        : '<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>';
      el.innerHTML = icono + '<span>' + texto + '</span>';
      el.className = `alert ${tipo === 'error' ? 'alert-error' : 'alert-success'} gap-3`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }

    function actualizarEstadisticas(reservas) {
      const hoy = new Date().toISOString().split('T')[0];
      const totalHoy = reservas.filter(r => r.fecha === hoy).length;
      const pendientes = reservas.filter(r => r.estado === 'CONFIRMADA').length;
      document.getElementById('totalHoy').textContent = totalHoy;
      document.getElementById('pendientes').textContent = pendientes;
    }

    async function cargarReservas() {
      const lista = document.getElementById('listaReservas');
      try {
        const res = await fetch(API_BASE);
        const reservas = await res.json();
        actualizarEstadisticas(reservas);
        if (reservas.length === 0) {
          lista.innerHTML = `
            <li class="flex flex-col items-center justify-center py-12 text-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-base-content/30 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <p class="font-semibold text-base-content/70">No hay reservas</p>
              <p class="text-sm text-base-content/50 mt-1">Las citas médicas aparecerán aquí automáticamente.</p>
            </li>
          `;
          return;
        }
        lista.innerHTML = reservas.map(r => {
          const medicoNombre = MEDICOS[r.medicoId] || r.medicoId;
          const fechaFormato = r.fecha ? new Date(r.fecha + 'T12:00:00').toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }) : r.fecha;
          return `
          <li class="flex justify-between items-center p-4 rounded-lg ${r.estado === 'CANCELADA' ? 'bg-base-200 opacity-60' : 'bg-base-200'}">
            <div>
              <p class="font-semibold ${r.estado === 'CANCELADA' ? 'line-through' : ''}">${r.pacienteNombre}</p>
              <p class="text-sm text-base-content/70">${fechaFormato} ${r.hora} — ${medicoNombre} — ${r.motivo || 'Consulta general'}</p>
            </div>
            ${r.estado !== 'CANCELADA' ? `
              <button class="btn btn-sm btn-error" onclick="cancelarReserva('${r.id}')">Cancelar</button>
            ` : ''}
          </li>
        `}).join('');
      } catch (err) {
        lista.innerHTML = '<li class="alert alert-error">Error al cargar. ¿Está el servidor en marcha?</li>';
      }
    }

    async function cancelarReserva(id) {
      try {
        const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
        if (res.ok) {
          mostrarMensaje('Reserva cancelada correctamente.');
          cargarReservas();
        } else {
          const data = await res.json();
          mostrarMensaje(data.error || 'Error al cancelar', 'error');
        }
      } catch (err) {
        mostrarMensaje('Error de conexión', 'error');
      }
    }

    document.getElementById('formReserva').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pacienteNombre = document.getElementById('pacienteNombre').value.trim();
      const medicoId = document.getElementById('medicoId').value;
      const fecha = document.getElementById('fecha').value;
      const hora = document.getElementById('hora').value;
      const motivo = document.getElementById('motivo').value.trim() || 'Consulta general';

      // Validación del formulario
      if (!pacienteNombre) {
        mostrarMensaje('Por favor ingrese el nombre del paciente.', 'error');
        return;
      }
      if (!medicoId) {
        mostrarMensaje('Por favor seleccione un médico.', 'error');
        return;
      }
      if (!fecha) {
        mostrarMensaje('Por favor seleccione la fecha de la cita.', 'error');
        return;
      }
      if (!hora) {
        mostrarMensaje('Por favor seleccione la hora.', 'error');
        return;
      }

      const pacienteId = 'P-' + Date.now();
      const datos = {
        pacienteId,
        pacienteNombre,
        medicoId,
        fecha,
        hora,
        motivo
      };
      try {
        const res = await fetch(API_BASE, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(datos)
        });
        const data = await res.json();
        if (res.ok) {
          mostrarMensaje('Reserva creada correctamente.');
          document.getElementById('formReserva').reset();
          fpFecha.clear();
          cargarReservas();
        } else {
          mostrarMensaje(data.error || 'Error al crear', 'error');
        }
      } catch (err) {
        mostrarMensaje('Error de conexión. ¿Está el servidor en marcha?', 'error');
      }
    });

    // Calendario en español con Flatpickr
    const fpFecha = flatpickr('#fecha', {
      locale: 'es',
      dateFormat: 'Y-m-d',
      minDate: 'today',
      allowInput: false,
      onChange: () => document.getElementById('fecha').setCustomValidity('')
    });

    cargarReservas();
  </script>
</body>
</html>
