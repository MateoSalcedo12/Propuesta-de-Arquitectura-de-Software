<!DOCTYPE html>
<html lang="es" data-theme="emerald">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Reservas Médicas</title>
  <link href="/output.css" rel="stylesheet">
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center p-4">
  <div class="card bg-base-100 shadow-xl w-full max-w-md">
    <div class="card-body">
      <h1 class="card-title text-2xl justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
        Reservas Médicas
      </h1>
      <p class="text-center text-base-content/70">Inicie sesión para continuar</p>
      <form id="formLogin" class="space-y-4 mt-4" novalidate>
        <div class="form-control">
          <label class="label" for="email"><span class="label-text">Correo electrónico</span></label>
          <input type="email" id="email" class="input input-bordered w-full" placeholder="ejemplo@correo.com" required>
        </div>
        <div class="form-control">
          <label class="label" for="password"><span class="label-text">Contraseña</span></label>
          <input type="password" id="password" class="input input-bordered w-full" placeholder="••••••••" required>
        </div>
        <div id="mensajeError" class="alert alert-error hidden"></div>
        <button type="submit" class="btn btn-primary w-full">Iniciar sesión</button>
      </form>
      <p class="text-sm text-center text-base-content/50 mt-4">
        Demo: admin@test.com / admin123
      </p>
    </div>
  </div>

  <script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const mensaje = document.getElementById('mensajeError');

    emailInput.oninvalid = () => emailInput.setCustomValidity('Por favor ingrese su correo electrónico.');
    emailInput.oninput = () => emailInput.setCustomValidity('');
    passwordInput.oninvalid = () => passwordInput.setCustomValidity('Por favor ingrese su contraseña.');
    passwordInput.oninput = () => passwordInput.setCustomValidity('');

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      mensaje.classList.add('hidden');

      if (!email) {
        mensaje.textContent = 'Por favor ingrese su correo electrónico.';
        mensaje.classList.remove('hidden');
        return;
      }
      if (!password) {
        mensaje.textContent = 'Por favor ingrese su contraseña.';
        mensaje.classList.remove('hidden');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        mensaje.textContent = 'Por favor ingrese un correo electrónico válido.';
        mensaje.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          mensaje.textContent = data.error || 'No se pudo iniciar sesión. Verifique sus credenciales.';
          mensaje.classList.remove('hidden');
        }
      } catch (err) {
        mensaje.textContent = 'Error de conexión. Verifique que el servidor esté en ejecución.';
        mensaje.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
